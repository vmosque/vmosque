name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Stats SVG
        run: |
          mkdir -p github-stats
          curl "https://github-readme-stats.vercel.app/api?username=vmosque&show_icons=true&theme=tokyonight" > github-stats/github-stats.svg
          curl "https://github-readme-stats.vercel.app/api/top-langs/?username=vmosque&layout=compact&theme=tokyonight" > github-stats/top-langs.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add github-stats/*
          git commit -m "update stats" || echo "No changes"
          git push
