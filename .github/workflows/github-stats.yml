name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Stats SVG safely
        run: |
          mkdir -p github-stats

          RESPONSE=$(curl -L -H "User-Agent: Mozilla/5.0" "https://github-readme-stats.vercel.app/api?username=vmosque&show_icons=true&theme=tokyonight")

          if echo "$RESPONSE" | grep -q "<svg"; then
            echo "$RESPONSE" > github-stats/github-stats.svg
          else
            echo '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120"><text x="10" y="50" fill="white">Stats not available</text></svg>' > github-stats/github-stats.svg
          fi

          RESPONSE2=$(curl -L -H "User-Agent: Mozilla/5.0" "https://github-readme-stats.vercel.app/api/top-langs/?username=vmosque&layout=compact&theme=tokyonight")

          if echo "$RESPONSE2" | grep -q "<svg"; then
            echo "$RESPONSE2" > github-stats/top-langs.svg
          else
            echo '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120"><text x="10" y="50" fill="white">Languages not available</text></svg>' > github-stats/top-langs.svg
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add github-stats/*
          git commit -m "update stats" || echo "No changes"
          git push
