name: Update README stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: 'username=pablovqueiroz&show_icons=true&theme=tokyonight'
          path: github-stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: 'username=pablovqueiroz&theme=tokyonight&layout=compact&custom_title=Technologies&langs_count=8'
          path: github-stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git stash push --include-untracked -m "github-actions-temp-stash" || true
          git pull --rebase origin main
      
          if git stash list | grep -q "github-actions-temp-stash"; then
            git stash pop || true
          fi
      
          git add github-stats/
          git diff --cached --quiet && exit 0
      
          git commit -m "chore: update readme stats"
          git push origin main
